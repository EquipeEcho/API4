services:
  api-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echocad_api
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: